<?xml version="1.0" encoding="UTF-8"?>
<svg width="980" height="1120" viewBox="0 0 980 1120"
     xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

  <defs>
    <!-- Standard arrow -->
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
    <!-- Return / dashed arrow -->
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
    <!-- Success arrow (green) -->
    <marker id="arr-grn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
  </defs>

  <!-- ========================================================= -->
  <!-- BACKGROUND -->
  <!-- ========================================================= -->
  <rect width="980" height="1120" fill="#F8FAFC" rx="10"/>

  <!-- Phase background bands -->
  <!-- Phase 1: Policy Setup -->
  <rect x="14" y="84" width="952" height="84" rx="4" fill="#DBEAFE" opacity="0.35"/>
  <!-- Phase 2: Quote Exchange -->
  <rect x="14" y="170" width="952" height="76" rx="4" fill="#F1F5F9" opacity="0.6"/>
  <!-- Phase 3: Authorization Creation -->
  <rect x="14" y="248" width="952" height="268" rx="4" fill="#EDE9FE" opacity="0.25"/>
  <!-- Phase 4: Verification -->
  <rect x="14" y="518" width="952" height="238" rx="4" fill="#FEF3C7" opacity="0.35"/>
  <!-- Phase 5: Energy + Settlement -->
  <rect x="14" y="758" width="952" height="234" rx="4" fill="#D1FAE5" opacity="0.3"/>
  <!-- Phase 6: Intent Attestation (optional) -->
  <rect x="14" y="992" width="952" height="100" rx="4" fill="#EDE9FE" opacity="0.15"/>

  <!-- Phase labels (right margin) -->
  <text x="968" y="126" text-anchor="end" fill="#93C5FD" font-size="9" font-weight="700" letter-spacing="1">POLICY</text>
  <text x="968" y="212" text-anchor="end" fill="#94A3B8" font-size="9" font-weight="700" letter-spacing="1">QUOTE</text>
  <text x="968" y="378" text-anchor="end" fill="#A78BFA" font-size="9" font-weight="700" letter-spacing="1">AUTH</text>
  <text x="968" y="630" text-anchor="end" fill="#FCD34D" font-size="9" font-weight="700" letter-spacing="1">VERIFY</text>
  <text x="968" y="875" text-anchor="end" fill="#6EE7B7" font-size="9" font-weight="700" letter-spacing="1">SETTLE</text>
  <text x="968" y="1048" text-anchor="end" fill="#C4B5FD" font-size="9" font-weight="700" letter-spacing="1">ATTEST</text>
  <text x="968" y="1060" text-anchor="end" fill="#C4B5FD" font-size="8" letter-spacing="1">(opt.)</text>

  <!-- ========================================================= -->
  <!-- ACTOR HEADER BOXES  (actor centers: 100, 300, 500, 700, 900) -->
  <!-- ========================================================= -->

  <!-- Fleet Policy Service -->
  <rect x="34" y="16" width="132" height="50" rx="6" fill="#1D4ED8"/>
  <text x="100" y="36" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Fleet Policy</text>
  <text x="100" y="53" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Service</text>

  <!-- Vehicle Wallet -->
  <rect x="234" y="16" width="132" height="50" rx="6" fill="#6D28D9"/>
  <text x="300" y="36" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Vehicle</text>
  <text x="300" y="53" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Wallet</text>

  <!-- Charging Station -->
  <rect x="434" y="16" width="132" height="50" rx="6" fill="#0F766E"/>
  <text x="500" y="36" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Charging</text>
  <text x="500" y="53" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Station</text>

  <!-- Charging Operator Backend -->
  <rect x="634" y="16" width="132" height="50" rx="6" fill="#B45309"/>
  <text x="700" y="33" text-anchor="middle" fill="white" font-size="10.5" font-weight="700">Charging Operator</text>
  <text x="700" y="50" text-anchor="middle" fill="white" font-size="10.5" font-weight="700">Backend</text>

  <!-- Settlement Rail -->
  <rect x="834" y="16" width="132" height="50" rx="6" fill="#0E7490"/>
  <text x="900" y="36" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Settlement</text>
  <text x="900" y="53" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Rail</text>

  <!-- ========================================================= -->
  <!-- LIFELINES -->
  <!-- ========================================================= -->
  <line x1="100" y1="66" x2="100" y2="1092" stroke="#CBD5E1" stroke-dasharray="5,4" stroke-width="1.5"/>
  <line x1="300" y1="66" x2="300" y2="1092" stroke="#CBD5E1" stroke-dasharray="5,4" stroke-width="1.5"/>
  <line x1="500" y1="66" x2="500" y2="1092" stroke="#CBD5E1" stroke-dasharray="5,4" stroke-width="1.5"/>
  <line x1="700" y1="66" x2="700" y2="1092" stroke="#CBD5E1" stroke-dasharray="5,4" stroke-width="1.5"/>
  <line x1="900" y1="66" x2="900" y2="1092" stroke="#CBD5E1" stroke-dasharray="5,4" stroke-width="1.5"/>

  <!-- ========================================================= -->
  <!-- STEP 1 — Fleet → Vehicle: Issue PolicyGrant -->
  <!-- ========================================================= -->
  <line x1="108" y1="112" x2="288" y2="112" stroke="#1D4ED8" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="194" y="104" text-anchor="middle" fill="#1E3A8A" font-size="12" font-weight="700">1. Issue PolicyGrant</text>

  <!-- ========================================================= -->
  <!-- STEP 2 — Vehicle self: Store PolicyGrant -->
  <!-- ========================================================= -->
  <rect x="312" y="128" width="158" height="22" rx="4" fill="#EEF2FF" stroke="#818CF8" stroke-width="1.5"/>
  <text x="391" y="143" text-anchor="middle" fill="#3730A3" font-size="11">2. Store PolicyGrant locally</text>

  <!-- ========================================================= -->
  <!-- STEP 3 — Vehicle → Charging: Request quote -->
  <!-- ========================================================= -->
  <line x1="308" y1="190" x2="488" y2="190" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <text x="398" y="182" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">3. Request quote</text>

  <!-- ========================================================= -->
  <!-- STEP 4 — Charging → Vehicle: Provide quote  (dashed return) -->
  <!-- ========================================================= -->
  <line x1="488" y1="225" x2="308" y2="225" stroke="#374151" stroke-width="2" stroke-dasharray="7,3" marker-end="url(#arr-gray)"/>
  <text x="398" y="218" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">4. Provide charging quote</text>

  <!-- ========================================================= -->
  <!-- STEPS 5–8 — Vehicle Wallet activation box  (y=252–472) -->
  <!-- ========================================================= -->
  <rect x="284" y="252" width="30" height="220" rx="3" fill="#DDD6FE" stroke="#7C3AED" stroke-width="2"/>

  <text x="322" y="272" fill="#4C1D95" font-size="11.5" font-weight="700">5. Validate policy</text>

  <line x1="320" y1="283" x2="468" y2="283" stroke="#C4B5FD" stroke-width="1"/>
  <text x="322" y="298" fill="#4C1D95" font-size="11.5" font-weight="700">6. Create SBA</text>
  <text x="322" y="313" fill="#7C3AED" font-size="10">    grantId → PolicyGrant</text>

  <line x1="320" y1="324" x2="468" y2="324" stroke="#C4B5FD" stroke-width="1"/>
  <text x="322" y="339" fill="#4C1D95" font-size="11.5" font-weight="700">7. Create SettlementIntent</text>
  <text x="322" y="354" fill="#7C3AED" font-size="10">    → compute intentHash</text>

  <line x1="320" y1="365" x2="468" y2="365" stroke="#C4B5FD" stroke-width="1"/>
  <text x="322" y="380" fill="#4C1D95" font-size="11.5" font-weight="700">8. Payment decision logic</text>
  <text x="322" y="395" fill="#7C3AED" font-size="10">    → assign decisionId &amp; quoteId</text>
  <text x="322" y="410" fill="#7C3AED" font-size="10">    → create &amp; sign SPA</text>

  <!-- ========================================================= -->
  <!-- SEND AUTHORIZATION BUNDLE — Vehicle → Charging Op Backend -->
  <!-- (crosses Charging Station lifeline) -->
  <!-- ========================================================= -->
  <line x1="308" y1="498" x2="688" y2="498" stroke="#111827" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="498" y="488" text-anchor="middle" fill="#111827" font-size="12" font-weight="700">Send authorization bundle</text>
  <text x="498" y="510" text-anchor="middle" fill="#6B7280" font-size="10">SPA · SBA · PolicyGrant · SettlementIntent</text>

  <!-- ========================================================= -->
  <!-- STEP 9 — Charging Op Backend: Verify artifact chain  (y=526–692) -->
  <!-- ========================================================= -->
  <rect x="684" y="526" width="30" height="166" rx="3" fill="#FDE68A" stroke="#D97706" stroke-width="2"/>

  <text x="721" y="546" fill="#92400E" font-size="11.5" font-weight="700">9. Verify MPCP artifact chain</text>
  <text x="721" y="562" fill="#78350F" font-size="10">  · resolve issuer public keys</text>
  <text x="721" y="576" fill="#78350F" font-size="10">    (HTTPS well-known or DID)</text>
  <text x="721" y="591" fill="#78350F" font-size="10">  · verify PolicyGrant signature</text>
  <text x="721" y="605" fill="#78350F" font-size="10">  · verify SBA (budget + chain)</text>
  <text x="721" y="619" fill="#78350F" font-size="10">  · verify SPA (signature + params)</text>
  <text x="721" y="633" fill="#78350F" font-size="10">  · confirm SPA ↔ quote match</text>

  <!-- ========================================================= -->
  <!-- STEP 10 — Backend → Charging Station: Verification passed -->
  <!-- ========================================================= -->
  <line x1="688" y1="714" x2="512" y2="714" stroke="#059669" stroke-width="2.5" marker-end="url(#arr-grn)"/>
  <text x="600" y="706" text-anchor="middle" fill="#065F46" font-size="12" font-weight="700">10. Verification passed</text>

  <!-- Charging Station self-note: Energy delivery begins -->
  <rect x="434" y="726" width="132" height="22" rx="4" fill="#D1FAE5" stroke="#34D399" stroke-width="1.5"/>
  <text x="500" y="741" text-anchor="middle" fill="#064E3B" font-size="11" font-weight="600">Energy delivery begins</text>

  <!-- ========================================================= -->
  <!-- STEP 11 — Vehicle → Settlement Rail: Submit XRPL payment -->
  <!-- (crosses Charging Station and Backend lifelines) -->
  <!-- ========================================================= -->
  <line x1="308" y1="782" x2="888" y2="782" stroke="#111827" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="598" y="772" text-anchor="middle" fill="#111827" font-size="12" font-weight="700">11. Submit XRPL payment</text>

  <!-- ========================================================= -->
  <!-- STEP 12 — Charging Op Backend: Post-settlement  (y=808–964) -->
  <!-- ========================================================= -->
  <rect x="684" y="808" width="30" height="156" rx="3" fill="#FDE68A" stroke="#D97706" stroke-width="2"/>

  <text x="721" y="828" fill="#92400E" font-size="11.5" font-weight="700">12. Post-settlement verification</text>
  <text x="721" y="845" fill="#78350F" font-size="10">  · verify settlement tx on rail</text>
  <text x="721" y="859" fill="#78350F" font-size="10">  · bind tx hash to decisionId</text>
  <text x="721" y="873" fill="#78350F" font-size="10">  · mark authorization consumed</text>
  <text x="721" y="887" fill="#78350F" font-size="10">  · store complete audit bundle</text>

  <!-- ========================================================= -->
  <!-- STEP 13 — Charging Op Backend: Anchor intentHash to HCS (optional) -->
  <!-- ========================================================= -->
  <rect x="684" y="1005" width="30" height="72" rx="3" fill="#EDE9FE" stroke="#A78BFA" stroke-dasharray="5,3" stroke-width="2"/>

  <text x="721" y="1025" fill="#6D28D9" font-size="11.5" font-weight="700">13. Anchor intentHash to HCS</text>
  <text x="721" y="1041" fill="#7C3AED" font-size="10">  · submit intentHash to HCS topic</text>
  <text x="721" y="1055" fill="#7C3AED" font-size="10">  · store consensus timestamp</text>
  <text x="721" y="1069" fill="#7C3AED" font-size="10">  · add anchor ref to audit bundle</text>

  <!-- ========================================================= -->
  <!-- FOOTER -->
  <!-- ========================================================= -->
  <text x="490" y="1112" text-anchor="middle" fill="#94A3B8" font-size="9.5">
    Machine Payment Control Protocol — Fleet EV Charging Runtime Sequence
  </text>

</svg>
