<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 180" width="580" height="180">
  <defs>
    <style>
      .box { fill: #1e293b; stroke: #475569; stroke-width: 1.5; rx: 6; }
      .arrow { fill: none; stroke: #94a3b8; stroke-width: 2; }
      .text { font-family: system-ui, sans-serif; font-size: 12px; fill: #f1f5f9; }
    </style>
  </defs>
  <rect class="box" x="10" y="70" width="90" height="40"/>
  <text class="text" x="55" y="95" text-anchor="middle">1. Policy</text>
  <text class="text" x="55" y="107" text-anchor="middle">Evaluation</text>

  <path class="arrow" d="M 100 90 L 130 90"/>
  <rect class="box" x="130" y="70" width="90" height="40"/>
  <text class="text" x="175" y="95" text-anchor="middle">2. Budget</text>
  <text class="text" x="175" y="107" text-anchor="middle">Issued</text>

  <path class="arrow" d="M 220 90 L 250 90"/>
  <rect class="box" x="250" y="70" width="90" height="40"/>
  <text class="text" x="295" y="95" text-anchor="middle">3. Payment</text>
  <text class="text" x="295" y="107" text-anchor="middle">Request</text>

  <path class="arrow" d="M 340 90 L 370 90"/>
  <rect class="box" x="370" y="70" width="90" height="40"/>
  <text class="text" x="415" y="95" text-anchor="middle">4. SPA</text>
  <text class="text" x="415" y="107" text-anchor="middle">Signed</text>

  <path class="arrow" d="M 460 90 L 475 90"/>
  <rect class="box" x="475" y="70" width="90" height="40"/>
  <text class="text" x="520" y="95" text-anchor="middle">5. Settle</text>
  <text class="text" x="520" y="107" text-anchor="middle">+ Verify</text>

  <text style="font-family: system-ui; font-size: 10px; fill: #64748b;" x="292" y="165" text-anchor="middle">Machine evaluates locally • Verifier validates chain • No central API at payment time</text>
</svg>
