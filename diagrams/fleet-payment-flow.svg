<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260">
  <defs>
    <style>
      .box { fill: #1e293b; stroke: #475569; stroke-width: 1.5; rx: 6; }
      .arrow { fill: none; stroke: #94a3b8; stroke-width: 2; }
      .arrow-dash { fill: none; stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 4; }
      .text { font-family: system-ui, sans-serif; font-size: 12px; fill: #f1f5f9; }
      .label { font-family: system-ui, sans-serif; font-size: 10px; fill: #94a3b8; }
    </style>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Parking Service -->
  <rect class="box" x="20" y="100" width="140" height="80"/>
  <text class="text" x="90" y="128" text-anchor="middle">Parking Service</text>
  <text class="label" x="90" y="142" text-anchor="middle">(meter / gate)</text>
  <text class="label" x="90" y="155" text-anchor="middle">• request</text>
  <text class="label" x="90" y="168" text-anchor="middle">• verify</text>

  <!-- Vehicle Agent -->
  <rect class="box" x="320" y="100" width="140" height="80"/>
  <text class="text" x="390" y="128" text-anchor="middle">Vehicle Agent</text>
  <text class="label" x="390" y="142" text-anchor="middle">(MPCP SDK + wallet)</text>
  <text class="label" x="390" y="155" text-anchor="middle">• policy check</text>
  <text class="label" x="390" y="168" text-anchor="middle">• budget check • sign SPA</text>

  <!-- Verifier -->
  <rect class="box" x="90" y="20" width="120" height="50"/>
  <text class="text" x="150" y="45" text-anchor="middle">Verifier</text>
  <text class="label" x="150" y="58" text-anchor="middle">(local, no API)</text>

  <!-- Settlement Rail -->
  <rect class="box" x="360" y="200" width="120" height="50"/>
  <text class="text" x="420" y="225" text-anchor="middle">Settlement Rail</text>
  <text class="label" x="420" y="238" text-anchor="middle">(mock / XRPL)</text>

  <!-- Arrows -->
  <path class="arrow-dash" d="M 160 140 L 310 140" marker-end="url(#arrow)"/>
  <text class="label" x="235" y="132" text-anchor="middle">payment request</text>

  <path class="arrow-dash" d="M 320 140 L 170 140" marker-end="url(#arrow)"/>
  <text class="label" x="245" y="155" text-anchor="middle">MPCP artifacts (SBA, SPA)</text>

  <path class="arrow" d="M 90 70 L 90 98"/>
  <text class="label" x="70" y="88" text-anchor="middle">verify</text>

  <path class="arrow" d="M 150 70 L 150 98"/>
  <text class="label" x="155" y="88" text-anchor="middle">PASS</text>

  <rect x="148" y="75" width="4" height="8" fill="#22c55e"/>
  <text class="label" x="150" y="105" text-anchor="middle">Gate opens</text>

  <path class="arrow" d="M 390 180 L 390 198"/>
  <text class="label" x="405" y="192" text-anchor="middle">execute</text>
</svg>
