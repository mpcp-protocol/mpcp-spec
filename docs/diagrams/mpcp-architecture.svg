<svg width="1700" height="860" viewBox="0 0 1700 860" xmlns="http://www.w3.org/2000/svg">

  <style>
    .title  { font: bold 20px system-ui, sans-serif; fill: #f1f5f9; }
    .sub    { font: 12px system-ui, sans-serif; fill: #94a3b8; }
    .colHdr { font: bold 10px system-ui, sans-serif; fill: #475569; letter-spacing: 1.5px; }
    .bTitle { font: bold 13px system-ui, sans-serif; }
    .bSub   { font: italic 11px system-ui, sans-serif; }
    .detail { font: 11.5px system-ui, sans-serif; fill: #cbd5e1; }
    .aLabel { font: bold 11px system-ui, sans-serif; }
    .aNote  { font: 10px system-ui, sans-serif; }
    .dim    { font: 10.5px system-ui, sans-serif; fill: #475569; }
    .chain  { font: 12px monospace; fill: #94a3b8; }
  </style>

  <defs>
    <marker id="ah"  markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="ahB" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#60a5fa"/></marker>
    <marker id="ahG" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4ade80"/></marker>
    <marker id="ahT" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2dd4bf"/></marker>
    <marker id="ahV" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#a78bfa"/></marker>
    <marker id="ahR" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f87171"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1700" height="860" fill="#0f172a"/>

  <!-- Title -->
  <text x="850" y="30" text-anchor="middle" class="title">MPCP Architecture Overview</text>
  <text x="850" y="50" text-anchor="middle" class="sub">Policy → Authorization Chain → Settlement · Each artifact cryptographically constrains the next</text>

  <!-- Native MPCP direct path label (inside gateway column, above gateway box) -->
  <text x="837" y="98" text-anchor="middle" class="aNote" fill="#4ade80">Auth Bundle (PolicyGrant + SBA + SPA)</text>
  <text x="837" y="112" text-anchor="middle" class="aNote" fill="#4ade80">native MPCP agents bypass gateway — direct to Service Provider</text>

  <!--
       Column layout (1700px canvas, 70px gaps)
       Col 1 PA:    x=60   w=260  right=320   center=190
       Col 2 Agent: x=390  w=272  right=662   center=526
       Col 3 GW:    x=732  w=210  right=942   center=837
       Col 4 SP:    x=1012 w=270  right=1282  center=1147
       Col 5 Rail:  x=1352 w=284  right=1636  center=1494
       Separators: 355 | 697 | 977 | 1317
  -->

  <!-- Column separators -->
  <line x1="355"  y1="70" x2="355"  y2="744" stroke="#1e293b" stroke-width="2"/>
  <line x1="697"  y1="70" x2="697"  y2="744" stroke="#1e293b" stroke-width="2"/>
  <line x1="977"  y1="70" x2="977"  y2="744" stroke="#1e293b" stroke-width="2"/>
  <line x1="1317" y1="70" x2="1317" y2="744" stroke="#1e293b" stroke-width="2"/>

  <!-- Column headers -->
  <text x="190"  y="78" text-anchor="middle" class="colHdr">POLICY AUTHORITY</text>
  <text x="526"  y="78" text-anchor="middle" class="colHdr">MACHINE / AI AGENT</text>
  <text x="1147" y="78" text-anchor="middle" class="colHdr">SERVICE PROVIDER</text>
  <text x="1494" y="78" text-anchor="middle" class="colHdr">SETTLEMENT RAIL</text>

  <!-- Direct native MPCP path: Agent right edge → SP left edge, routed through gateway column space -->
  <path d="M662,122 L1005,122" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ahG)"/>

  <!-- ================================================================
       COL 1 — POLICY AUTHORITY
       ================================================================ -->

  <!-- Fleet Operator: x=60 y=90 w=260 h=168 -->
  <rect x="60" y="90" width="260" height="168" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="111" text-anchor="middle" class="bTitle" fill="#60a5fa">Fleet Operator</text>
  <line x1="76" y1="119" x2="304" y2="119" stroke="#1e3a5f" stroke-width="1"/>
  <text x="76" y="138" class="detail">• vehicle payment policies</text>
  <text x="76" y="156" class="detail">• spending limits + vendor allowlists</text>
  <text x="76" y="174" class="detail">• allowedRails, allowedAssets</text>
  <text x="76" y="192" class="detail">• SESSION / DAY scope grants</text>
  <text x="190" y="236" text-anchor="middle" class="bSub" fill="#64748b">Robotaxi · Delivery · IoT fleet</text>

  <text x="190" y="284" text-anchor="middle" class="sub" fill="#334155">— or —</text>

  <!-- Human Principal: x=60 y=298 w=260 h=182 -->
  <rect x="60" y="298" width="260" height="182" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="319" text-anchor="middle" class="bTitle" fill="#60a5fa">Human Principal</text>
  <line x1="76" y1="327" x2="304" y2="327" stroke="#1e3a5f" stroke-width="1"/>
  <text x="76" y="346" class="detail">• individual user with DID key</text>
  <text x="76" y="364" class="detail">• budget + allowedPurposes filter</text>
  <text x="76" y="382" class="detail">• TRIP scope (multi-day)</text>
  <text x="76" y="400" class="detail">• revocable delegation at any time</text>
  <text x="76" y="418" class="detail">• optional on-chain anchor (HCS)</text>
  <text x="190" y="456" text-anchor="middle" class="bSub" fill="#64748b">Travel agent · Subscription mgr</text>

  <!-- ================================================================
       COL 2 — MACHINE / AI AGENT
       ================================================================ -->

  <!-- Agent box: x=390 y=90 w=272 h=444 -->
  <rect x="390" y="90" width="272" height="444" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="526" y="111" text-anchor="middle" class="bTitle" fill="#4ade80">Machine Wallet / AI Agent</text>
  <line x1="406" y1="119" x2="646" y2="119" stroke="#14532d" stroke-width="1"/>

  <text x="526" y="139" text-anchor="middle" fill="#86efac" class="bSub">Vehicle Wallet</text>
  <text x="406" y="158" class="detail">• stores PolicyGrant (offline-capable)</text>
  <text x="406" y="176" class="detail">• signs SBA (SESSION / DAY scope)</text>
  <text x="406" y="194" class="detail">• signs SPA per payment request</text>
  <text x="406" y="212" class="detail">• hardware key binding (device key)</text>
  <text x="526" y="232" text-anchor="middle" class="bSub" fill="#64748b">EV · Robot · IoT device</text>

  <line x1="406" y1="244" x2="646" y2="244" stroke="#14532d" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="526" y="264" text-anchor="middle" fill="#86efac" class="bSub">AI Agent  (human-issued grant)</text>
  <text x="406" y="283" class="detail">• receives PolicyGrant from human</text>
  <text x="406" y="301" class="detail">• signs SBA with TRIP scope</text>
  <text x="406" y="319" class="detail">• enforces allowedPurposes per request</text>
  <text x="406" y="337" class="detail">• tracks cumulative spend across TRIP</text>
  <text x="406" y="355" class="detail">• checks revocationEndpoint before SPA</text>
  <text x="526" y="375" text-anchor="middle" class="bSub" fill="#64748b">Travel · Subscription · Compute</text>

  <line x1="406" y1="387" x2="646" y2="387" stroke="#14532d" stroke-width="1"/>
  <text x="526" y="406" text-anchor="middle" class="dim">PolicyGrant → SBA → SPA</text>
  <text x="526" y="424" text-anchor="middle" class="dim">stateless · verifiable offline</text>
  <text x="526" y="442" text-anchor="middle" class="dim">Wallet SDK · @mpcp/agent · @mpcp/core</text>
  <text x="526" y="460" text-anchor="middle" class="dim">@mpcp/react · createX402Client</text>
  <text x="526" y="478" text-anchor="middle" class="dim">mpcp-gateway-client · session.fetch()</text>
  <text x="526" y="496" text-anchor="middle" class="dim">LangChain / Vercel AI / AutoGen adapters</text>
  <text x="526" y="514" text-anchor="middle" class="dim">x402 merchant mode via gateway</text>

  <!-- ================================================================
       COL 3 — MPCP GATEWAY (optional)
       ================================================================ -->

  <!-- Gateway box: x=732 y=160 w=210 h=432 -->
  <rect x="732" y="160" width="210" height="432" rx="6" fill="#0c1f1e" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="837" y="181" text-anchor="middle" class="bTitle" fill="#2dd4bf">MPCP Gateway</text>
  <line x1="748" y1="189" x2="926" y2="189" stroke="#134e4a" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="837" y="207" text-anchor="middle" fill="#5eead4" class="bSub">gateway-client  (agent-side)</text>
  <text x="748" y="226" class="detail">• GatewayClient + GatewaySession</text>
  <text x="748" y="244" class="detail">• session.fetch() — drop-in fetch</text>
  <text x="748" y="262" class="detail">• onSoftLimit callback</text>
  <text x="748" y="280" class="detail">• LangChain / Vercel AI adapters</text>

  <line x1="748" y1="292" x2="926" y2="292" stroke="#134e4a" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="837" y="310" text-anchor="middle" fill="#5eead4" class="bSub">gateway server  (transparent proxy)</text>
  <text x="748" y="329" class="detail">• intercepts HTTP 402</text>
  <text x="748" y="347" class="detail">• enforces budget + purposes</text>
  <text x="748" y="365" class="detail">• executes x402 payment</text>
  <text x="748" y="383" class="detail">• attaches X-Mpcp-Sba header</text>
  <text x="748" y="401" class="detail">• Trust Bundle at /.well-known</text>
  <text x="748" y="419" class="detail">• spend webhooks · soft limits</text>
  <text x="748" y="437" class="detail">• merchant allow/blocklist</text>
  <text x="748" y="455" class="detail">• velocity limits · signed receipts</text>

  <line x1="748" y1="467" x2="926" y2="467" stroke="#134e4a" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="837" y="485" text-anchor="middle" class="dim">bridges non-MPCP agents to</text>
  <text x="837" y="503" text-anchor="middle" class="dim">MPCP-aware merchants</text>
  <text x="837" y="521" text-anchor="middle" class="dim">native MPCP agents bypass this layer</text>

  <!-- Optional badge -->
  <rect x="772" y="533" width="130" height="21" rx="4" fill="#134e4a" stroke="#0d9488" stroke-width="1"/>
  <text x="837" y="548" text-anchor="middle" fill="#2dd4bf" style="font: bold 10px system-ui,sans-serif; letter-spacing:0.5px">OPTIONAL LAYER</text>

  <!-- ================================================================
       COL 4 — SERVICE PROVIDER
       ================================================================ -->

  <!-- SP box: x=1012 y=90 w=270 h=334 -->
  <rect x="1012" y="90" width="270" height="334" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1147" y="111" text-anchor="middle" class="bTitle" fill="#fbbf24">Service Provider</text>
  <text x="1147" y="128" text-anchor="middle" class="bSub" fill="#fbbf24">+ MPCP Verifier</text>
  <line x1="1028" y1="136" x2="1266" y2="136" stroke="#451a03" stroke-width="1"/>

  <text x="1028" y="155" class="detail">• receives Auth Bundle from agent</text>
  <text x="1028" y="173" class="detail">• resolves issuer DID → public key</text>
  <text x="1028" y="191" class="detail">• verifies PolicyGrant signature ✓</text>
  <text x="1028" y="209" class="detail">• verifies SBA (budget + scope) ✓</text>
  <text x="1028" y="227" class="detail">• verifies SPA (amount + destination) ✓</text>
  <text x="1028" y="245" class="detail">• optional: check revocationEndpoint</text>
  <text x="1028" y="263" class="detail">• grants service or returns 402</text>

  <line x1="1028" y1="275" x2="1266" y2="275" stroke="#451a03" stroke-width="1"/>
  <text x="1147" y="293" text-anchor="middle" class="bSub" fill="#64748b">Charging · Hotel · SaaS API</text>
  <text x="1147" y="311" text-anchor="middle" class="bSub" fill="#64748b">Toll · Parking · Inference API</text>

  <line x1="1028" y1="323" x2="1266" y2="323" stroke="#451a03" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="1147" y="341" text-anchor="middle" class="dim">mpcp-merchant-sdk · verifyMpcp()</text>
  <text x="1147" y="359" text-anchor="middle" class="dim">Express · Fastify · Next.js · Edge</text>
  <text x="1147" y="377" text-anchor="middle" class="dim">revocation cache · spend tracking</text>
  <text x="1147" y="395" text-anchor="middle" class="dim">Trust Bundle offline key resolution</text>
  <text x="1147" y="413" text-anchor="middle" class="dim">HTTP 402 middleware</text>

  <!-- DID Resolver: x=1012 y=446 w=270 h=112 -->
  <rect x="1012" y="446" width="270" height="112" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="1147" y="467" text-anchor="middle" class="bTitle" fill="#94a3b8">DID Resolver</text>
  <text x="1147" y="483" text-anchor="middle" class="bSub" fill="#64748b">(used by verifier at sig check)</text>
  <line x1="1028" y1="491" x2="1266" y2="491" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="1028" y="509" class="detail">• did:key — inline, no network call</text>
  <text x="1028" y="527" class="detail">• did:xrpl · did:hedera · did:web</text>

  <!-- ================================================================
       COL 5 — SETTLEMENT RAIL
       ================================================================ -->

  <!-- Rail box: x=1352 y=90 w=284 h=228 -->
  <rect x="1352" y="90" width="284" height="228" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1494" y="111" text-anchor="middle" class="bTitle" fill="#a78bfa">Settlement Rail</text>
  <line x1="1368" y1="119" x2="1620" y2="119" stroke="#2e1065" stroke-width="1"/>

  <text x="1368" y="138" class="detail">XRPL / RLUSD</text>
  <text x="1368" y="156" class="detail">EVM / Stablecoins</text>
  <text x="1368" y="174" class="detail">Stripe / Fiat</text>
  <text x="1368" y="192" class="detail">Hosted Payment</text>

  <line x1="1368" y1="204" x2="1620" y2="204" stroke="#2e1065" stroke-width="1"/>
  <text x="1494" y="222" text-anchor="middle" class="dim">MPCP constrains authorization</text>
  <text x="1494" y="240" text-anchor="middle" class="dim">above settlement — rail-agnostic</text>
  <text x="1494" y="258" text-anchor="middle" class="dim">no per-transaction approval</text>
  <text x="1494" y="276" text-anchor="middle" class="dim">required at payment time</text>
  <text x="1494" y="306" text-anchor="middle" class="dim">policy-authority · mpcp-reference</text>

  <!-- Policy Anchoring box: x=1352 y=340 w=284 h=112 -->
  <rect x="1352" y="340" width="284" height="112" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="1494" y="361" text-anchor="middle" class="bTitle" fill="#94a3b8">Policy Anchoring</text>
  <text x="1494" y="377" text-anchor="middle" class="bSub" fill="#64748b">(optional, at grant issuance)</text>
  <line x1="1368" y1="385" x2="1620" y2="385" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="1368" y="403" class="detail">• Hedera HCS — policy hash on-chain</text>
  <text x="1368" y="421" class="detail">• XRPL NFT — burn to revoke</text>
  <text x="1368" y="439" class="detail">• AES-256-GCM encrypted anchoring</text>

  <!-- ================================================================
       REVOCATION ENDPOINT (below col 2)
       ================================================================ -->

  <!-- Revocation box: x=390 y=562 w=272 h=134 -->
  <rect x="390" y="562" width="272" height="134" rx="6" fill="#1e293b" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="526" y="583" text-anchor="middle" class="bTitle" fill="#fb7185">Revocation Endpoint</text>
  <text x="526" y="599" text-anchor="middle" class="bSub" fill="#fb7185">(hosted by policy authority)</text>
  <line x1="406" y1="607" x2="646" y2="607" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="406" y="625" class="detail">• GET /revoke?grantId= → { revoked }</text>
  <text x="406" y="643" class="detail">• checked before each SPA signing</text>
  <text x="406" y="661" class="detail">• checked by verifier before service</text>
  <text x="406" y="679" class="detail">• TTL cache in merchant-sdk</text>

  <!-- ================================================================
       ARROWS
       ================================================================ -->

  <!-- PolicyGrant: Fleet Operator → Agent (y=172) -->
  <path d="M320,172 L390,172" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#ahB)"/>

  <!-- PolicyGrant: Human → Agent (y=382) -->
  <path d="M320,382 L390,382" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#ahB)"/>

  <!-- PolicyGrant label — centered in 70px gap (x=355) -->
  <text x="355" y="260" text-anchor="middle" class="aLabel" fill="#60a5fa">Policy</text>
  <text x="355" y="276" text-anchor="middle" class="aLabel" fill="#60a5fa">Grant</text>

  <!-- Agent → Gateway-client (y=245) -->
  <path d="M662,245 L732,245" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#ahT)"/>
  <text x="697" y="239" text-anchor="middle" class="aNote" fill="#2dd4bf">session</text>
  <text x="697" y="252" text-anchor="middle" class="aNote" fill="#2dd4bf">.fetch()</text>

  <!-- Gateway server → SP (y=380) -->
  <path d="M942,380 L1012,380" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#ahT)"/>
  <text x="977" y="372" text-anchor="middle" class="aNote" fill="#2dd4bf">x402</text>
  <text x="977" y="388" text-anchor="middle" class="aNote" fill="#2dd4bf">+ SBA</text>

  <!-- Settlement: SP → Rail (y=222) -->
  <path d="M1282,222 L1352,222" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#ahV)"/>
  <text x="1317" y="212" text-anchor="middle" class="aLabel" fill="#a78bfa">settles</text>

  <!-- Revocation: Agent → Revocation endpoint (straight down) -->
  <path d="M526,534 L526,562" fill="none" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ahR)"/>
  <text x="544" y="550" class="aNote" fill="#f87171">check revocation</text>

  <!-- DID Resolve: SP → DID Resolver (straight down) -->
  <path d="M1147,424 L1147,446" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <text x="1165" y="438" class="aNote" fill="#64748b">resolve key</text>

  <!-- ================================================================
       AUTHORIZATION CHAIN FOOTER
       ================================================================ -->

  <rect x="20" y="756" width="1660" height="54" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="850" y="776" text-anchor="middle" class="sub" fill="#475569">Authorization Chain</text>
  <text x="850" y="797" text-anchor="middle" class="chain">PolicyGrant → SignedBudgetAuthorization → SignedPaymentAuthorization → SettlementIntent → Settlement</text>

</svg>
