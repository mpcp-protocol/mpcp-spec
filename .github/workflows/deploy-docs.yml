name: Deploy docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger-org-site:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger org site rebuild
        run: |
          gh api repos/mpcp-protocol/mpcp-protocol.github.io/dispatches \
            --method POST \
            -f event_type=deploy-docs
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
