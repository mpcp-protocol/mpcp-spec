<svg width="1500" height="860" viewBox="0 0 1500 860" xmlns="http://www.w3.org/2000/svg">

  <style>
    .title  { font: bold 20px system-ui, sans-serif; fill: #f1f5f9; }
    .sub    { font: 12px system-ui, sans-serif; fill: #94a3b8; }
    .colHdr { font: bold 10px system-ui, sans-serif; fill: #475569; letter-spacing: 1.5px; }
    .bTitle { font: bold 13px system-ui, sans-serif; }
    .bSub   { font: italic 11px system-ui, sans-serif; }
    .detail { font: 11.5px system-ui, sans-serif; fill: #cbd5e1; }
    .aLabel { font: bold 11px system-ui, sans-serif; }
    .aNote  { font: 10px system-ui, sans-serif; }
    .dim    { font: 10.5px system-ui, sans-serif; fill: #475569; }
    .chain  { font: 12px monospace; fill: #94a3b8; }
  </style>

  <defs>
    <marker id="ah"  markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="ahB" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#60a5fa"/></marker>
    <marker id="ahG" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4ade80"/></marker>
    <marker id="ahT" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2dd4bf"/></marker>
    <marker id="ahV" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#a78bfa"/></marker>
    <marker id="ahR" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f87171"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1500" height="860" fill="#0f172a"/>

  <!-- Title -->
  <text x="750" y="30" text-anchor="middle" class="title">MPCP Architecture Overview</text>
  <text x="750" y="50" text-anchor="middle" class="sub">Policy → Authorization Chain → Settlement · Each artifact cryptographically constrains the next</text>

  <!-- Native MPCP direct path label (above box tops) -->
  <text x="689" y="65" text-anchor="middle" class="aNote" fill="#4ade80">Auth Bundle (PolicyGrant + SBA + SPA) — native MPCP agents send direct, no gateway required</text>

  <!-- Column separators -->
  <line x1="288" y1="70" x2="288" y2="744" stroke="#1e293b" stroke-width="2"/>
  <line x1="576" y1="70" x2="576" y2="744" stroke="#1e293b" stroke-width="2"/>
  <line x1="802" y1="70" x2="802" y2="744" stroke="#1e293b" stroke-width="2"/>
  <line x1="1088" y1="70" x2="1088" y2="744" stroke="#1e293b" stroke-width="2"/>

  <!-- Column headers -->
  <text x="154"  y="78" text-anchor="middle" class="colHdr">POLICY AUTHORITY</text>
  <text x="432"  y="78" text-anchor="middle" class="colHdr">MACHINE / AI AGENT</text>
  <text x="689"  y="78" text-anchor="middle" class="colHdr">MPCP GATEWAY  (optional)</text>
  <text x="945"  y="78" text-anchor="middle" class="colHdr">SERVICE PROVIDER</text>
  <text x="1236" y="78" text-anchor="middle" class="colHdr">SETTLEMENT RAIL</text>

  <!-- Direct native MPCP path: Agent right edge → SP left edge, routed above boxes -->
  <path d="M568,88 L568,82 L810,82 L810,88" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ahG)"/>

  <!-- ================================================================
       COL 1 — POLICY AUTHORITY
       ================================================================ -->

  <!-- Fleet Operator: x=20 y=90 w=260 h=168 -->
  <rect x="20" y="90" width="260" height="168" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="111" text-anchor="middle" class="bTitle" fill="#60a5fa">Fleet Operator</text>
  <line x1="36" y1="119" x2="272" y2="119" stroke="#1e3a5f" stroke-width="1"/>
  <text x="34" y="138" class="detail">• vehicle payment policies</text>
  <text x="34" y="156" class="detail">• spending limits + vendor allowlists</text>
  <text x="34" y="174" class="detail">• allowedRails, allowedAssets</text>
  <text x="34" y="192" class="detail">• SESSION / DAY scope grants</text>
  <text x="150" y="236" text-anchor="middle" class="bSub" fill="#64748b">Robotaxi · Delivery · IoT fleet</text>

  <text x="150" y="264" text-anchor="middle" class="sub" fill="#334155">— or —</text>

  <!-- Human Principal: x=20 y=278 w=260 h=182 -->
  <rect x="20" y="278" width="260" height="182" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="299" text-anchor="middle" class="bTitle" fill="#60a5fa">Human Principal</text>
  <line x1="36" y1="307" x2="272" y2="307" stroke="#1e3a5f" stroke-width="1"/>
  <text x="34" y="326" class="detail">• individual user with DID key</text>
  <text x="34" y="344" class="detail">• budget + allowedPurposes filter</text>
  <text x="34" y="362" class="detail">• TRIP scope (multi-day)</text>
  <text x="34" y="380" class="detail">• revocable delegation at any time</text>
  <text x="34" y="398" class="detail">• optional on-chain anchor (HCS)</text>
  <text x="150" y="436" text-anchor="middle" class="bSub" fill="#64748b">Travel agent · Subscription mgr</text>

  <!-- ================================================================
       COL 2 — MACHINE / AI AGENT
       ================================================================ -->

  <!-- Agent box: x=296 y=90 w=272 h=444 -->
  <rect x="296" y="90" width="272" height="444" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="432" y="111" text-anchor="middle" class="bTitle" fill="#4ade80">Machine Wallet / AI Agent</text>
  <line x1="312" y1="119" x2="552" y2="119" stroke="#14532d" stroke-width="1"/>

  <text x="432" y="139" text-anchor="middle" fill="#86efac" class="bSub">Vehicle Wallet</text>
  <text x="312" y="158" class="detail">• stores PolicyGrant (offline-capable)</text>
  <text x="312" y="176" class="detail">• signs SBA (SESSION / DAY scope)</text>
  <text x="312" y="194" class="detail">• signs SPA per payment request</text>
  <text x="312" y="212" class="detail">• hardware key binding (device key)</text>
  <text x="432" y="232" text-anchor="middle" class="bSub" fill="#64748b">EV · Robot · IoT device</text>

  <line x1="312" y1="244" x2="552" y2="244" stroke="#14532d" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="432" y="264" text-anchor="middle" fill="#86efac" class="bSub">AI Agent  (human-issued grant)</text>
  <text x="312" y="283" class="detail">• receives PolicyGrant from human</text>
  <text x="312" y="301" class="detail">• signs SBA with TRIP scope</text>
  <text x="312" y="319" class="detail">• enforces allowedPurposes per request</text>
  <text x="312" y="337" class="detail">• tracks cumulative spend across TRIP</text>
  <text x="312" y="355" class="detail">• checks revocationEndpoint before SPA</text>
  <text x="432" y="375" text-anchor="middle" class="bSub" fill="#64748b">Travel · Subscription · Compute</text>

  <line x1="312" y1="387" x2="552" y2="387" stroke="#14532d" stroke-width="1"/>
  <text x="432" y="406" text-anchor="middle" class="dim">PolicyGrant → SBA → SPA</text>
  <text x="432" y="424" text-anchor="middle" class="dim">stateless · verifiable offline</text>
  <text x="432" y="442" text-anchor="middle" class="dim">Wallet SDK · @mpcp/agent · @mpcp/core</text>
  <text x="432" y="460" text-anchor="middle" class="dim">@mpcp/react · createX402Client</text>
  <text x="432" y="478" text-anchor="middle" class="dim">mpcp-gateway-client · session.fetch()</text>
  <text x="432" y="496" text-anchor="middle" class="dim">LangChain / Vercel AI / AutoGen adapters</text>
  <text x="432" y="514" text-anchor="middle" class="dim">x402 merchant mode via gateway</text>

  <!-- ================================================================
       COL 3 — MPCP GATEWAY (optional)
       ================================================================ -->

  <!-- Gateway box: x=584 y=90 w=210 h=432 -->
  <rect x="584" y="90" width="210" height="432" rx="6" fill="#0c1f1e" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="689" y="111" text-anchor="middle" class="bTitle" fill="#2dd4bf">MPCP Gateway</text>
  <line x1="600" y1="119" x2="776" y2="119" stroke="#134e4a" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="689" y="137" text-anchor="middle" fill="#5eead4" class="bSub">gateway-client  (agent-side)</text>
  <text x="600" y="156" class="detail">• GatewayClient + GatewaySession</text>
  <text x="600" y="174" class="detail">• session.fetch() — drop-in fetch</text>
  <text x="600" y="192" class="detail">• onSoftLimit callback</text>
  <text x="600" y="210" class="detail">• LangChain / Vercel AI adapters</text>

  <line x1="600" y1="222" x2="776" y2="222" stroke="#134e4a" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="689" y="240" text-anchor="middle" fill="#5eead4" class="bSub">gateway server  (transparent proxy)</text>
  <text x="600" y="259" class="detail">• intercepts HTTP 402</text>
  <text x="600" y="277" class="detail">• enforces session budget + purposes</text>
  <text x="600" y="295" class="detail">• executes x402 payment</text>
  <text x="600" y="313" class="detail">• attaches X-Mpcp-Sba header</text>
  <text x="600" y="331" class="detail">• Trust Bundle at /.well-known</text>
  <text x="600" y="349" class="detail">• spend webhooks · soft limits</text>
  <text x="600" y="367" class="detail">• merchant allow/blocklist</text>
  <text x="600" y="385" class="detail">• velocity limits · signed receipts</text>

  <line x1="600" y1="397" x2="776" y2="397" stroke="#134e4a" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="689" y="415" text-anchor="middle" class="dim">P1–P10 complete</text>
  <text x="689" y="433" text-anchor="middle" class="dim">bridges non-MPCP agents to</text>
  <text x="689" y="451" text-anchor="middle" class="dim">MPCP-aware merchants</text>
  <text x="689" y="469" text-anchor="middle" class="dim">native MPCP agents send direct</text>
  <text x="689" y="487" text-anchor="middle" class="dim">(see dashed arrow above)</text>

  <!-- Optional badge -->
  <rect x="624" y="499" width="130" height="21" rx="4" fill="#134e4a" stroke="#0d9488" stroke-width="1"/>
  <text x="689" y="514" text-anchor="middle" fill="#2dd4bf" style="font: bold 10px system-ui,sans-serif; letter-spacing:0.5px">OPTIONAL LAYER</text>

  <!-- ================================================================
       COL 4 — SERVICE PROVIDER
       ================================================================ -->

  <!-- SP box: x=810 y=90 w=270 h=334 -->
  <rect x="810" y="90" width="270" height="334" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="945" y="111" text-anchor="middle" class="bTitle" fill="#fbbf24">Service Provider</text>
  <text x="945" y="128" text-anchor="middle" class="bSub" fill="#fbbf24">+ MPCP Verifier</text>
  <line x1="826" y1="136" x2="1062" y2="136" stroke="#451a03" stroke-width="1"/>

  <text x="826" y="155" class="detail">• receives Auth Bundle from agent</text>
  <text x="826" y="173" class="detail">• resolves issuer DID → public key</text>
  <text x="826" y="191" class="detail">• verifies PolicyGrant signature ✓</text>
  <text x="826" y="209" class="detail">• verifies SBA (budget + scope) ✓</text>
  <text x="826" y="227" class="detail">• verifies SPA (amount + destination) ✓</text>
  <text x="826" y="245" class="detail">• optional: check revocationEndpoint</text>
  <text x="826" y="263" class="detail">• grants service or returns 402</text>

  <line x1="826" y1="275" x2="1062" y2="275" stroke="#451a03" stroke-width="1"/>
  <text x="945" y="293" text-anchor="middle" class="bSub" fill="#64748b">Charging · Hotel · SaaS API</text>
  <text x="945" y="311" text-anchor="middle" class="bSub" fill="#64748b">Toll · Parking · Inference API</text>

  <line x1="826" y1="323" x2="1062" y2="323" stroke="#451a03" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="945" y="341" text-anchor="middle" class="dim">mpcp-merchant-sdk · verifyMpcp()</text>
  <text x="945" y="359" text-anchor="middle" class="dim">Express · Fastify · Next.js · Edge</text>
  <text x="945" y="377" text-anchor="middle" class="dim">revocation cache · spend tracking</text>
  <text x="945" y="395" text-anchor="middle" class="dim">Trust Bundle offline key resolution</text>
  <text x="945" y="413" text-anchor="middle" class="dim">HTTP 402 middleware</text>

  <!-- DID Resolver: x=810 y=446 w=270 h=112 -->
  <rect x="810" y="446" width="270" height="112" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="945" y="467" text-anchor="middle" class="bTitle" fill="#94a3b8">DID Resolver</text>
  <text x="945" y="483" text-anchor="middle" class="bSub" fill="#64748b">(used by verifier at sig check)</text>
  <line x1="826" y1="491" x2="1062" y2="491" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="826" y="509" class="detail">• did:key — inline, no network call</text>
  <text x="826" y="527" class="detail">• did:xrpl · did:hedera · did:web</text>

  <!-- ================================================================
       COL 5 — SETTLEMENT RAIL
       ================================================================ -->

  <!-- Rail box: x=1096 y=90 w=284 h=228 -->
  <rect x="1096" y="90" width="284" height="228" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1238" y="111" text-anchor="middle" class="bTitle" fill="#a78bfa">Settlement Rail</text>
  <line x1="1112" y1="119" x2="1362" y2="119" stroke="#2e1065" stroke-width="1"/>

  <text x="1112" y="138" class="detail">XRPL / RLUSD</text>
  <text x="1112" y="156" class="detail">EVM / Stablecoins</text>
  <text x="1112" y="174" class="detail">Stripe / Fiat</text>
  <text x="1112" y="192" class="detail">Hosted Payment</text>

  <line x1="1112" y1="204" x2="1362" y2="204" stroke="#2e1065" stroke-width="1"/>
  <text x="1238" y="222" text-anchor="middle" class="dim">MPCP constrains authorization</text>
  <text x="1238" y="240" text-anchor="middle" class="dim">above settlement — rail-agnostic</text>
  <text x="1238" y="258" text-anchor="middle" class="dim">no per-transaction approval</text>
  <text x="1238" y="276" text-anchor="middle" class="dim">required at payment time</text>
  <text x="1238" y="306" text-anchor="middle" class="dim">policy-authority · mpcp-reference</text>

  <!-- Policy Anchoring box: x=1096 y=340 w=284 h=112 -->
  <rect x="1096" y="340" width="284" height="112" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="1238" y="361" text-anchor="middle" class="bTitle" fill="#94a3b8">Policy Anchoring</text>
  <text x="1238" y="377" text-anchor="middle" class="bSub" fill="#64748b">(optional, at grant issuance)</text>
  <line x1="1112" y1="385" x2="1362" y2="385" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="1112" y="403" class="detail">• Hedera HCS — policy hash on-chain</text>
  <text x="1112" y="421" class="detail">• XRPL NFT — burn to revoke</text>
  <text x="1112" y="439" class="detail">• AES-256-GCM encrypted anchoring</text>

  <!-- ================================================================
       REVOCATION ENDPOINT (below col 2)
       ================================================================ -->

  <!-- Revocation box: x=296 y=562 w=272 h=134 -->
  <rect x="296" y="562" width="272" height="134" rx="6" fill="#1e293b" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="432" y="583" text-anchor="middle" class="bTitle" fill="#fb7185">Revocation Endpoint</text>
  <text x="432" y="599" text-anchor="middle" class="bSub" fill="#fb7185">(hosted by policy authority)</text>
  <line x1="312" y1="607" x2="552" y2="607" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="312" y="625" class="detail">• GET /revoke?grantId= → { revoked }</text>
  <text x="312" y="643" class="detail">• checked before each SPA signing</text>
  <text x="312" y="661" class="detail">• checked by verifier before service</text>
  <text x="312" y="679" class="detail">• TTL cache in merchant-sdk</text>

  <!-- ================================================================
       ARROWS
       ================================================================ -->

  <!-- PolicyGrant: Fleet Operator → Agent (y=172) -->
  <path d="M280,172 L296,172" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#ahB)"/>

  <!-- PolicyGrant: Human → Agent (y=362) -->
  <path d="M280,362 L296,362" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#ahB)"/>

  <!-- PolicyGrant label (col 1 / col 2 gap) -->
  <text x="288" y="260" text-anchor="middle" class="aLabel" fill="#60a5fa">Policy</text>
  <text x="288" y="274" text-anchor="middle" class="aLabel" fill="#60a5fa">Grant</text>

  <!-- Agent → Gateway-client (y=175) -->
  <path d="M568,175 L584,175" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#ahT)"/>
  <text x="576" y="169" text-anchor="middle" class="aNote" fill="#2dd4bf">→</text>

  <!-- Gateway server → SP (y=310) -->
  <path d="M794,310 L810,310" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#ahT)"/>
  <text x="802" y="302" text-anchor="middle" class="aNote" fill="#2dd4bf">x402</text>
  <text x="802" y="318" text-anchor="middle" class="aNote" fill="#2dd4bf">+ SBA</text>

  <!-- Settlement: SP → Rail (y=222) -->
  <path d="M1080,222 L1096,222" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#ahV)"/>
  <text x="1088" y="214" text-anchor="middle" class="aLabel" fill="#a78bfa">settles</text>
  <text x="1088" y="232" text-anchor="middle" class="aNote" fill="#a78bfa">SettlementIntent</text>

  <!-- Revocation: Agent → Revocation endpoint (straight down) -->
  <path d="M432,534 L432,562" fill="none" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ahR)"/>
  <text x="450" y="550" class="aNote" fill="#f87171">check revocation</text>

  <!-- DID Resolve: SP → DID Resolver (straight down) -->
  <path d="M945,424 L945,446" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <text x="968" y="438" class="aNote" fill="#64748b">resolve key</text>

  <!-- ================================================================
       AUTHORIZATION CHAIN FOOTER
       ================================================================ -->

  <rect x="20" y="756" width="1460" height="54" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="750" y="776" text-anchor="middle" class="sub" fill="#475569">Authorization Chain</text>
  <text x="750" y="797" text-anchor="middle" class="chain">PolicyGrant → SignedBudgetAuthorization → SignedPaymentAuthorization → SettlementIntent → Settlement</text>

</svg>
