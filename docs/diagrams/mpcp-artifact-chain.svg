<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <style>
      .box { fill: #1e293b; stroke: #475569; stroke-width: 1.5; rx: 6; }
      .arrow { fill: none; stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: system-ui, sans-serif; font-size: 13px; fill: #f1f5f9; }
      .label { font-family: system-ui, sans-serif; font-size: 11px; fill: #94a3b8; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect class="box" x="40" y="20" width="200" height="44"/>
  <text class="text" x="140" y="47" text-anchor="middle">PolicyGrant</text>
  <text class="label" x="140" y="58" text-anchor="middle">allowedRails, policyHash, expiresAt</text>

  <line class="arrow" x1="140" y1="64" x2="140" y2="86"/>
  <rect class="box" x="40" y="86" width="200" height="44"/>
  <text class="text" x="140" y="113" text-anchor="middle">SignedBudgetAuthorization</text>
  <text class="label" x="140" y="124" text-anchor="middle">maxAmountMinor, destinationAllowlist</text>

  <line class="arrow" x1="140" y1="130" x2="140" y2="152"/>
  <rect class="box" x="40" y="152" width="200" height="44"/>
  <text class="text" x="140" y="179" text-anchor="middle">SignedPaymentAuthorization</text>
  <text class="label" x="140" y="190" text-anchor="middle">rail, amount, destination, intentHash</text>

  <line class="arrow" x1="140" y1="196" x2="140" y2="218"/>
  <rect class="box" x="40" y="218" width="200" height="44"/>
  <text class="text" x="140" y="245" text-anchor="middle">Settlement</text>
  <text class="label" x="140" y="256" text-anchor="middle">Execution + Verification</text>
</svg>
