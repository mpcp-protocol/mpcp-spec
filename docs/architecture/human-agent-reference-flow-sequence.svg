<?xml version="1.0" encoding="UTF-8"?>
<svg width="980" height="1130" viewBox="0 0 980 1130"
     xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

  <defs>
    <!-- Standard arrow -->
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
    <!-- Return / dashed arrow -->
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
    <!-- Success arrow (green) -->
    <marker id="arr-grn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
    <!-- Warning / revoke arrow (orange) -->
    <marker id="arr-org" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#D97706"/>
    </marker>
    <!-- Blue arrow -->
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1D4ED8"/>
    </marker>
  </defs>

  <!-- ========================================================= -->
  <!-- BACKGROUND -->
  <!-- ========================================================= -->
  <rect width="980" height="1130" fill="#F8FAFC" rx="10"/>

  <!-- Phase 1: Setup — Alice issues PolicyGrant -->
  <rect x="14" y="84" width="952" height="100" rx="4" fill="#DBEAFE" opacity="0.35"/>
  <!-- Phase 2: Pre-trip — Agent creates SBA -->
  <rect x="14" y="186" width="952" height="90" rx="4" fill="#EDE9FE" opacity="0.3"/>
  <!-- Phase 3: Booking (Stop 1) -->
  <rect x="14" y="278" width="952" height="364" rx="4" fill="#FEF3C7" opacity="0.35"/>
  <!-- Phase 4: Skip (Stop 3) -->
  <rect x="14" y="644" width="952" height="96" rx="4" fill="#FEE2E2" opacity="0.4"/>
  <!-- Phase 5: Revocation -->
  <rect x="14" y="742" width="952" height="104" rx="4" fill="#FED7AA" opacity="0.4"/>
  <!-- Phase 6: Reject (Stop 5) -->
  <rect x="14" y="848" width="952" height="96" rx="4" fill="#FEE2E2" opacity="0.4"/>
  <!-- Phase 7: Audit -->
  <rect x="14" y="946" width="952" height="100" rx="4" fill="#D1FAE5" opacity="0.3"/>

  <!-- Phase labels (right margin) -->
  <text x="968" y="134" text-anchor="end" fill="#93C5FD" font-size="9" font-weight="700" letter-spacing="1">SETUP</text>
  <text x="968" y="232" text-anchor="end" fill="#A78BFA" font-size="9" font-weight="700" letter-spacing="1">PRE-TRIP</text>
  <text x="968" y="460" text-anchor="end" fill="#FCD34D" font-size="9" font-weight="700" letter-spacing="1">BOOKING</text>
  <text x="968" y="462" text-anchor="end" fill="#FCD34D" font-size="8" letter-spacing="1">(Stop 1)</text>
  <text x="968" y="692" text-anchor="end" fill="#FCA5A5" font-size="9" font-weight="700" letter-spacing="1">SKIP</text>
  <text x="968" y="694" text-anchor="end" fill="#FCA5A5" font-size="8" letter-spacing="1">(Stop 3)</text>
  <text x="968" y="794" text-anchor="end" fill="#FDBA74" font-size="9" font-weight="700" letter-spacing="1">REVOKE</text>
  <text x="968" y="896" text-anchor="end" fill="#FCA5A5" font-size="9" font-weight="700" letter-spacing="1">REJECT</text>
  <text x="968" y="898" text-anchor="end" fill="#FCA5A5" font-size="8" letter-spacing="1">(Stop 5)</text>
  <text x="968" y="996" text-anchor="end" fill="#6EE7B7" font-size="9" font-weight="700" letter-spacing="1">AUDIT</text>

  <!-- ========================================================= -->
  <!-- ACTOR HEADER BOXES  (actor centers: 112, 337, 562, 787) -->
  <!-- ========================================================= -->

  <!-- Alice's Wallet -->
  <rect x="46" y="16" width="132" height="50" rx="6" fill="#1D4ED8"/>
  <text x="112" y="36" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Alice's</text>
  <text x="112" y="53" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Wallet</text>

  <!-- AI Agent -->
  <rect x="271" y="16" width="132" height="50" rx="6" fill="#6D28D9"/>
  <text x="337" y="36" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">AI Agent</text>
  <text x="337" y="53" text-anchor="middle" fill="white" font-size="11" font-weight="600">(Trip Planner v2)</text>

  <!-- Service Provider -->
  <rect x="496" y="16" width="132" height="50" rx="6" fill="#0F766E"/>
  <text x="562" y="36" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Service</text>
  <text x="562" y="53" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Provider</text>

  <!-- Settlement Rail -->
  <rect x="721" y="16" width="132" height="50" rx="6" fill="#0E7490"/>
  <text x="787" y="36" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Settlement</text>
  <text x="787" y="53" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Rail</text>

  <!-- ========================================================= -->
  <!-- LIFELINES -->
  <!-- ========================================================= -->
  <line x1="112" y1="66" x2="112" y2="1102" stroke="#CBD5E1" stroke-dasharray="5,4" stroke-width="1.5"/>
  <line x1="337" y1="66" x2="337" y2="1102" stroke="#CBD5E1" stroke-dasharray="5,4" stroke-width="1.5"/>
  <line x1="562" y1="66" x2="562" y2="1102" stroke="#CBD5E1" stroke-dasharray="5,4" stroke-width="1.5"/>
  <line x1="787" y1="66" x2="787" y2="1102" stroke="#CBD5E1" stroke-dasharray="5,4" stroke-width="1.5"/>

  <!-- ========================================================= -->
  <!-- PHASE 1 — SETUP -->
  <!-- ========================================================= -->

  <!-- Step 1: Alice → Agent: Issue PolicyGrant -->
  <line x1="120" y1="114" x2="325" y2="114" stroke="#1D4ED8" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <text x="224" y="106" text-anchor="middle" fill="#1E3A8A" font-size="12" font-weight="700">1. Issue PolicyGrant</text>

  <!-- Step 2: Agent self note: store + key fields -->
  <rect x="349" y="126" width="200" height="44" rx="4" fill="#EEF2FF" stroke="#818CF8" stroke-width="1.5"/>
  <text x="353" y="142" fill="#3730A3" font-size="10.5" font-weight="700">2. Store PolicyGrant</text>
  <text x="353" y="157" fill="#7C3AED" font-size="10">    allowedPurposes · revocationEndpoint</text>

  <!-- ========================================================= -->
  <!-- PHASE 2 — PRE-TRIP: Agent creates SBA -->
  <!-- ========================================================= -->

  <!-- Step 3: Agent activation for SBA creation -->
  <rect x="321" y="198" width="30" height="68" rx="3" fill="#DDD6FE" stroke="#7C3AED" stroke-width="2"/>
  <text x="359" y="218" fill="#4C1D95" font-size="11.5" font-weight="700">3. Create SBA (TRIP scope)</text>
  <text x="359" y="234" fill="#7C3AED" font-size="10">    budgetScope=TRIP · $800</text>
  <text x="359" y="249" fill="#7C3AED" font-size="10">    actorId=ai-trip-planner-v2</text>

  <!-- ========================================================= -->
  <!-- PHASE 3 — BOOKING (Stop 1: Hotel $250) -->
  <!-- ========================================================= -->

  <!-- Step 4: Provider → Agent: Send quote -->
  <line x1="550" y1="300" x2="349" y2="300" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="292" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">4. Send quote</text>
  <text x="455" y="313" text-anchor="middle" fill="#6B7280" font-size="10">Stop 1 · Hotel · $250 · travel:hotel</text>

  <!-- Step 5–8: Agent activation box for policy decision + SBA -->
  <rect x="321" y="326" width="30" height="240" rx="3" fill="#DDD6FE" stroke="#7C3AED" stroke-width="2"/>

  <text x="359" y="348" fill="#4C1D95" font-size="11.5" font-weight="700">5. Check allowedPurposes</text>
  <text x="359" y="363" fill="#059669" font-size="10">    travel:hotel ✓ permitted</text>

  <line x1="357" y1="374" x2="545" y2="374" stroke="#C4B5FD" stroke-width="1"/>
  <text x="359" y="390" fill="#4C1D95" font-size="11.5" font-weight="700">6. Check cumulative budget</text>
  <text x="359" y="405" fill="#059669" font-size="10">    $0 + $250 = $250 ≤ $800 ✓</text>

  <line x1="357" y1="416" x2="545" y2="416" stroke="#C4B5FD" stroke-width="1"/>
  <text x="359" y="432" fill="#4C1D95" font-size="11.5" font-weight="700">7. Sign SBA (this booking)</text>
  <text x="359" y="447" fill="#7C3AED" font-size="10">    → maxAmountMinor · destination</text>

  <line x1="357" y1="458" x2="545" y2="458" stroke="#C4B5FD" stroke-width="1"/>
  <text x="359" y="474" fill="#4C1D95" font-size="11.5" font-weight="700">8. Submit SBA to Trust Gateway</text>
  <text x="359" y="489" fill="#7C3AED" font-size="10">    hotel-001 · $250 RLUSD</text>

  <line x1="357" y1="500" x2="545" y2="500" stroke="#C4B5FD" stroke-width="1"/>
  <text x="359" y="516" fill="#7C3AED" font-size="10">    cumulative: $250 / $800</text>

  <!-- Step 9: Agent → Provider: Send authorization bundle -->
  <line x1="351" y1="548" x2="550" y2="548" stroke="#111827" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="455" y="538" text-anchor="middle" fill="#111827" font-size="12" font-weight="700">9. Send authorization bundle</text>
  <text x="455" y="561" text-anchor="middle" fill="#6B7280" font-size="10">SBA · PolicyGrant</text>

  <!-- Step 10: Provider verification box -->
  <rect x="546" y="576" width="30" height="140" rx="3" fill="#FDE68A" stroke="#D97706" stroke-width="2"/>

  <text x="584" y="596" fill="#92400E" font-size="11.5" font-weight="700">10. Verify MPCP chain</text>
  <text x="584" y="611" fill="#78350F" font-size="10">  · resolve Alice's DID key</text>
  <text x="584" y="625" fill="#78350F" font-size="10">  · verify PolicyGrant signature</text>
  <text x="584" y="639" fill="#78350F" font-size="10">  · verify SBA (TRIP scope)</text>
  <text x="584" y="653" fill="#78350F" font-size="10">  · verify SBA (amount + destination)</text>
  <text x="584" y="667" fill="#78350F" font-size="10">  · checkRevocation → active ✓</text>

  <!-- Step 11: Service confirmed, Agent → Rail -->
  <rect x="496" y="728" width="132" height="22" rx="4" fill="#D1FAE5" stroke="#34D399" stroke-width="1.5"/>
  <text x="562" y="743" text-anchor="middle" fill="#064E3B" font-size="11" font-weight="600">11. Service confirmed</text>

  <!-- Step 12: Trust Gateway → Rail: Submit XRPL payment -->
  <line x1="570" y1="588" x2="775" y2="588" stroke="#111827" stroke-width="2" marker-end="url(#arr)"/>
  <text x="672" y="578" text-anchor="middle" fill="#111827" font-size="11" font-weight="600">12. Trust Gateway → XRPL (250 RLUSD)</text>

  <!-- ========================================================= -->
  <!-- PHASE 4 — SKIP (Stop 3: Restaurant / travel:dining) -->
  <!-- ========================================================= -->

  <!-- Provider → Agent: Quote for restaurant -->
  <line x1="550" y1="662" x2="349" y2="662" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="654" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">13. Quote from restaurant</text>
  <text x="455" y="675" text-anchor="middle" fill="#6B7280" font-size="10">Stop 3 · Le Jules Verne · travel:dining</text>

  <!-- Agent: Purpose not allowed -->
  <rect x="349" y="688" width="200" height="44" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="353" y="704" fill="#991B1B" font-size="10.5" font-weight="700">14. allowedPurposes check:</text>
  <text x="353" y="719" fill="#DC2626" font-size="10">    travel:dining ✗ — SBA refused</text>

  <!-- ========================================================= -->
  <!-- PHASE 5 — REVOCATION -->
  <!-- ========================================================= -->

  <!-- Alice: Revoke grant -->
  <rect x="96" y="756" width="30" height="64" rx="3" fill="#FED7AA" stroke="#F59E0B" stroke-width="2"/>
  <text x="134" y="776" fill="#92400E" font-size="11.5" font-weight="700">15. Alice revokes grant</text>
  <text x="134" y="791" fill="#B45309" font-size="10">    wallet marks grantId revoked</text>

  <!-- Provider: checkRevocation → revoked:true -->
  <line x1="550" y1="806" x2="124" y2="806" stroke="#D97706" stroke-width="2" stroke-dasharray="7,3" marker-end="url(#arr-org)"/>
  <text x="337" y="798" text-anchor="middle" fill="#92400E" font-size="11.5" font-weight="700">16. checkRevocation → revoked: true</text>

  <!-- Provider note -->
  <rect x="496" y="820" width="132" height="22" rx="4" fill="#FEE2E2" stroke="#F87171" stroke-width="1.5"/>
  <text x="562" y="835" text-anchor="middle" fill="#991B1B" font-size="11" font-weight="600">Refuse further payments</text>

  <!-- ========================================================= -->
  <!-- PHASE 6 — REJECT (Stop 5: Extra hotel $300) -->
  <!-- ========================================================= -->

  <!-- Provider → Agent: Quote for extra hotel -->
  <line x1="550" y1="866" x2="349" y2="866" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="858" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">17. Quote for extra hotel</text>
  <text x="455" y="879" text-anchor="middle" fill="#6B7280" font-size="10">Stop 5 · $300 · travel:hotel</text>

  <!-- Agent: Budget exceeded + revoked -->
  <rect x="349" y="892" width="200" height="44" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="353" y="908" fill="#991B1B" font-size="10.5" font-weight="700">18. Budget check: $550+$300=$850&gt;$800</text>
  <text x="353" y="923" fill="#DC2626" font-size="10">    Also: grant revoked ✗ — SBA refused</text>

  <!-- ========================================================= -->
  <!-- PHASE 7 — POST-TRIP AUDIT -->
  <!-- ========================================================= -->

  <!-- Audit: All three actors verify -->
  <rect x="96" y="960" width="30" height="72" rx="3" fill="#D1FAE5" stroke="#34D399" stroke-width="2"/>
  <rect x="321" y="960" width="30" height="72" rx="3" fill="#D1FAE5" stroke="#34D399" stroke-width="2"/>
  <rect x="546" y="960" width="30" height="72" rx="3" fill="#D1FAE5" stroke="#34D399" stroke-width="2"/>

  <text x="134" y="980" fill="#065F46" font-size="11.5" font-weight="700">19. Post-trip audit</text>
  <text x="134" y="996" fill="#064E3B" font-size="10">  · 3/3 bundles verified</text>
  <text x="134" y="1011" fill="#064E3B" font-size="10">  · total $550 / $800</text>
  <text x="134" y="1026" fill="#064E3B" font-size="10">  · 1 revocation detected</text>

  <!-- ========================================================= -->
  <!-- FOOTER -->
  <!-- ========================================================= -->
  <text x="490" y="1122" text-anchor="middle" fill="#94A3B8" font-size="9.5">
    Machine Payment Control Protocol — Human-to-Agent Travel Budget Runtime Sequence
  </text>

</svg>
